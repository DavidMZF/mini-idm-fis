global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend ldap_frontend
    bind *:389
    default_backend ldap_backend

frontend ldaps_frontend
    bind *:636
    default_backend ldaps_backend

backend ldap_backend
    balance roundrobin
    option tcp-check
    server ldap1 ldap1.fis.epn.ec:389 check
    server ldap2 ldap2.fis.epn.ec:389 check

backend ldaps_backend
    balance roundrobin
    option tcp-check
    server ldap1 ldap1.fis.epn.ec:636 check
    server ldap2 ldap2.fis.epn.ec:636 check
