vrrp_script chk_haproxy {
    script "/usr/bin/pgrep haproxy"
    interval 2
    weight 2
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 150
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass fis2026
    }

    virtual_ipaddress {
        172.18.0.100
    }

    track_script {
        chk_haproxy
    }
}
