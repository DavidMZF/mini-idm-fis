<VirtualHost *:443>
    ServerName web1.fis.epn.ec
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/web1/certs/web1.crt
    SSLCertificateKeyFile /etc/web1/certs/web1.key
    SSLCACertificateFile /etc/web1/certs/ca.crt

    ErrorLog ${APACHE_LOG_DIR}/web1-error.log
    CustomLog ${APACHE_LOG_DIR}/web1-access.log combined

    <Directory /var/www/html>
        Options +Includes
        AddOutputFilter INCLUDES .shtml
        DirectoryIndex index.shtml
    </Directory>

    <Location /health>
        Require all granted
    </Location>

    Alias /whoami /var/www/html/index.shtml

    <Location /whoami>
        AuthType GSSAPI
        AuthName "FIS Kerberos Login"

        GssapiCredStore keytab:/etc/krb5.keytab
        GssapiSSLonly On
        GssapiUseSessions Off
        GssapiLocalName On

        LogLevel auth_gssapi:debug

        AuthLDAPURL "ldaps://lb.fis.epn.ec:636/dc=fis,dc=epn,dc=ec?uid"
        AuthLDAPBindDN "cn=admin,dc=fis,dc=epn,dc=ec"
        AuthLDAPBindPassword "Password2026!"

        Require valid-user
        Require ldap-group "cn=estudiantes,ou=groups,dc=fis,dc=epn,dc=ec"
    </Location>
</VirtualHost>
