[logging]
    kdc = FILE:/var/log/krb5kdc/krb5kdc.log
    admin_server = FILE:/var/log/krb5kdc/kadmind.log
    default = FILE:/var/log/krb5kdc/krb5libs.log

[libdefaults]
    default_realm = FIS.EPN.EC
    dns_lookup_realm = false
    dns_lookup_kdc = false
    rdns = false
    ticket_lifetime = 5h
    renew_lifetime = 1d
    forwardable = true
    kdc_timeout = 3000

[realms]
    FIS.EPN.EC = {
        kdc = kdc1.fis.epn.ec
        kdc = kdc2.fis.epn.ec
        admin_server = kdc1.fis.epn.ec
        default_domain = fis.epn.ec
    }

[domain_realm]
    .fis.epn.ec = FIS.EPN.EC
    fis.epn.ec = FIS.EPN.EC
